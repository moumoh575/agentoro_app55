<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentoro - AI Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(229, 231, 235, 0.5); }
        .status-dot { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="text-gray-900">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-blue-600">AGENTORO</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-green-50 px-3 py-1 rounded-full border border-green-200">
                <span class="status-dot"></span>
                <span class="text-green-700 text-sm font-medium">Server Live</span>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-semibold transition-all shadow-md">
                <i class="fab fa-facebook mr-2"></i> Login with Meta
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 px-6">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800">مراقبة الرسائل المباشرة</h2>
            <p class="text-gray-500 mt-2">عرض حي للرسائل التي يعالجها الذكاء الاصطناعي عبر تطبيق Instagram.</p>
        </div>

        <div class="glass-card rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gray-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                <h3 class="font-bold text-gray-700 flex items-center gap-2">
                    <i class="fas fa-list-ul text-blue-500"></i> سجل النشاط الأخير (Live Logs)
                </h3>
                <span id="update-timer" class="text-xs text-gray-400 italic">يتحدث تلقائياً كل 5 ثوانٍ...</span>
            </div>
            
            <div id="logs-list" class="divide-y divide-gray-100 max-h-[600px] overflow-y-auto">
                <div class="p-10 text-center text-gray-400">
                    <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                    <p>جاري جلب البيانات من السيرفر...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // دالة لجلب البيانات من سيرفر agentoro.shop
        async function fetchLogs() {
            const logsContainer = document.getElementById('logs-list');
            
            try {
                // الرابط الذي يعمل الآن بنجاح في سيرفرك
                const response = await fetch('https://agentoro.shop/get-logs');
                const logs = await response.json();
                
                if (logs.length === 0) {
                    logsContainer.innerHTML = `
                        <div class="p-10 text-center text-gray-500 italic">
                            لا توجد رسائل مسجلة حتى الآن. أرسل رسالة من إنستغرام لتجربة النظام.
                        </div>`;
                    return;
                }

                // بناء قائمة الرسائل
                logsContainer.innerHTML = logs.reverse().map(log => `
                    <div class="p-6 hover:bg-blue-50/50 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-0.5 rounded uppercase tracking-wider">Customer Message</span>
                            <span class="text-xs text-gray-400 font-mono">${log.time || 'Time unknown'}</span>
                        </div>
                        <p class="text-gray-800 font-semibold mb-3">"${log.message}"</p>
                        <div class="bg-white/80 border border-gray-100 p-3 rounded-lg shadow-sm">
                            <div class="flex items-center gap-2 mb-1">
                                <i class="fas fa-robot text-purple-500 text-xs"></i>
                                <span class="text-xs font-bold text-purple-600">Agentoro AI Response:</span>
                            </div>
                            <p class="text-sm text-gray-600 italic leading-relaxed">
                                ${log.status || 'AI is thinking...'}
                            </p>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error fetching logs:', error);
                logsContainer.innerHTML = `
                    <div class="p-10 text-center text-red-500">
                        <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                        <p>خطأ في الاتصال بالسيرفر. تأكد من تشغيل app.py</p>
                    </div>`;
            }
        }

        // تحديث البيانات فور تحميل الصفحة
        fetchLogs();

        // تحديث تلقائي كل 5 ثوانٍ
        setInterval(fetchLogs, 5000);
    </script>

    <footer class="mt-20 py-10 border-t border-gray-200 text-center text-gray-400 text-sm">
        &copy; 2026 Agentoro Tech - Built for Meta App Review.
    </footer>
</body>
</html>
